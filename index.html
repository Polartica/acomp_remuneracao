<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
  <title>Visibilidade de Resultados · Desempenho</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <!-- Tela de Login -->
    <div id="login-container">
      <h2>Resultados</h2>
      <p class="sub">Acompanhe seu desempenho atual</p>
      <form id="login-form">
        <input type="text" id="username" placeholder="Código do funcionário" required autocomplete="off" inputmode="text">
        <input type="password" id="password" placeholder="Senha" required>
        <button type="submit">Entrar</button>
      </form>
      <div id="error-message" class="error"></div>
    </div>

    <!-- Dashboard (oculto inicialmente) -->
    <div id="dashboard-container" style="display: none;">
      <div class="contracheque">
        <div class="cabecalho">
          <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap;">
            <h1 style="margin:0;">Visibilidade de Resultados</h1>
            <button id="abrir-chamado-btn" class="btn-chamado" style="background: #ff9800; border: none; color: white; padding: 8px 16px; border-radius: 30px; font-weight: bold; cursor: pointer;">📢 Abrir Chamado</button>
          </div>
          <p class="empresa">Empresa: Polartica Distribuidora de Bebidas AmBev </p>
          <div class="info-funcionario">
            <p><strong>👤 Nome:</strong> <span id="nome-funcionario"></span></p>
            <p><strong>🆔 Código:</strong> <span id="codigo-funcionario"></span></p>
          </div>
        </div>
        <div class="conteudo" id="dados-funcionario">
          <!-- Os dados serão preenchidos dinamicamente pelo script.js -->
        </div>
        <div class="rodape">
          <p class="total-label">💰 TOTAL A RECEBER</p>
          <p class="total-valor" id="total-value">—</p>
        </div>
        <button id="logout-btn" class="btn-sair">Sair da conta</button>
      </div>
    </div>
  </div>

  <!-- MODAL para abrir chamado -->
<!-- MODAL CHAMADOS -->
<div id="modal-chamado" class="modal" style="display:none;">

  <div class="modal-content modal-chamados">

    <span class="close-modal">&times;</span>

    <div class="chamados-grid">

      <!-- FORMULÁRIO -->
      <div class="novo-chamado">

        <h3>📢 Abrir Chamado</h3>

        <form id="form-chamado">

          <label for="assunto">Assunto</label>
          <input type="text" id="assunto" required>

          <label for="descricao">Descrição</label>
          <textarea id="descricao" rows="5" required></textarea>

          <button type="submit">
            Enviar Chamado
          </button>

        </form>

        <div id="msg-chamado"></div>

      </div>

      <!-- CHAMADOS ABERTOS -->
      <div class="painel-chamados">

        <div class="painel-header">
          <h3>📋 Meus Chamados</h3>
          <span id="total-chamados">0 abertos</span>
        </div>

        <div id="lista-chamados">

          <div class="empty-state">
            Nenhum chamado aberto.
          </div>

        </div>

      </div>

    </div>

  </div>

</div>

  <script src="script.js"></script>
</body>
</html>
