<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0a2b4e">
  <title>Visibilidade de Resultados · Desempenho</title>
  
  <!-- Fontes e Ícones -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
  
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    
    <!-- Tela de Login -->
    <div id="login-container" class="modern-card">
      <div class="login-header">
        <div class="">
          <img src="logo.png" width="128px">
        </div>
        <h2>Resultados</h2>
        <p class="sub">Acompanhe seu desempenho atual</p>
      </div>
      
      <form id="login-form">
        <div class="input-group">
          <i class="ph ph-identification-card"></i>
          <input type="text" id="username" placeholder="Código do funcionário" required autocomplete="off" inputmode="numeric">
        </div>
        <div class="input-group">
          <i class="ph ph-lock-key"></i>
          <input type="password" id="password" placeholder="Senha" required>
        </div>
        <button type="submit" class="btn-primary">
          Entrar <i class="ph-bold ph-arrow-right"></i>
        </button>
      </form>
          <div class="footer-note">
          <i class="bi bi-shield-lock"></i>Desenvolvido por Eduarda - APR
          </div>
      <div id="error-message" class="error"></div>
    </div>

    <!-- Dashboard (oculto inicialmente) -->
    <div id="dashboard-container" style="display: none;">
      
      <!-- Cabeçalho estilo App de Banco -->
      <header class="app-header">
        <div class="header-top">
          <div class="empresa-badge">
            <i class="ph-fill ph-buildings"></i> Polartica AmBev
          </div>
          <button id="abrir-chamado-btn" class="btn-icon-text">
            <i class="ph-bold ph-headset"></i> Feedback
          </button>
        </div>
        
        <div class="user-profile">
          <div class="avatar">
            <i class="ph-fill ph-user"></i>
          </div>
          <div class="user-info">
            <p class="saudacao">Olá,</p>
            <h1 id="nome-funcionario">Nome do Funcionário</h1>
            <span class="user-id">Código: <strong id="codigo-funcionario">0000</strong></span>
          </div>
        </div>

        <!-- Cartão de Saldo Total Movid0 para o Topo -->
        <div class="balance-card">
          <div class="balance-label">
            <i class="ph-fill ph-wallet"></i> TOTAL A RECEBER
          </div>
          <h2 id="total-value" class="total-valor">—</h2>
        </div>
      </header>

      <main class="conteudo-scroll">
        <div class="conteudo" id="dados-funcionario">
          <!-- Os dados serão preenchidos dinamicamente pelo script.js -->
        </div>

        <button id="logout-btn" class="btn-sair">
          <i class="ph-bold ph-sign-out"></i> Sair da conta
        </button>
      </main>
    </div>
  </div>

  <!-- MODAL CHAMADOS (Estilo Bottom Sheet no Mobile) -->
  <div id="modal-chamado" class="modal" style="display:none;">
    <div class="modal-content">
      <div class="modal-drag-handle"></div>
      <button class="close-modal" aria-label="Fechar"><i class="ph-bold ph-x"></i></button>

      <div class="chamados-container">
        
        <!-- FORMULÁRIO -->
        <div class="novo-chamado box-section">
          <h3><i class="ph-fill ph-paper-plane-tilt"></i> Abrir Novo Chamado</h3>
          <form id="form-chamado">
            <div class="input-group">
              <input type="text" id="assunto" placeholder="Assunto" required>
            </div>
            <div class="input-group">
              <textarea id="descricao" rows="4" placeholder="Descreva sua solicitação com detalhes..." required></textarea>
            </div>
            <button type="submit" class="btn-primary">
              Enviar Chamado <i class="ph-bold ph-paper-plane-right"></i>
            </button>
          </form>
          <div id="msg-chamado"></div>
        </div>

        <!-- CHAMADOS ABERTOS -->
        <div class="painel-chamados box-section">
          <div class="painel-header">
            <h3><i class="ph-fill ph-list-bullets"></i> Meus Chamados</h3>
            <span id="total-chamados" class="badge">0 abertos</span>
          </div>
          <div id="lista-chamados" class="lista-scroll">
            <div class="empty-state">
              <i class="ph ph-tray"></i>
              <p>Nenhum chamado aberto.</p>
            </div>
          </div>
        </div>

      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
