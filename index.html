<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
  <title>Contracheque · Folha de Pagamento</title>
  <!-- Fonte moderna e leve -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <!-- Tela de Login -->
    <div id="login-container">
      <h2>📄 Contracheque</h2>
      <p class="sub">Acesse seu holerite</p>
      <form id="login-form">
        <input type="text" id="username" placeholder="Código do funcionário" required autocomplete="off" inputmode="text">
        <input type="password" id="password" placeholder="Senha" required>
        <button type="submit">Entrar</button>
      </form>
      <div id="error-message" class="error"></div>
    </div>

    <!-- Dashboard (oculto inicialmente) -->
    <div id="dashboard-container" style="display: none;">
      <div class="contracheque">
        <div class="cabecalho">
          <h1>CONTRACHEQUE</h1>
          <p class="empresa">Empresa: Minha Empresa Ltda. • Folha Padrão</p>
          <div class="info-funcionario">
            <p><strong>👤 Nome:</strong> <span id="nome-funcionario"></span></p>
            <p><strong>🆔 Código:</strong> <span id="codigo-funcionario"></span></p>
          </div>
        </div>
        <div class="conteudo" id="dados-funcionario">
          <!-- Os dados serão preenchidos dinamicamente pelo script.js -->
        </div>
        <div class="rodape">
          <p class="total-label">💰 TOTAL A RECEBER</p>
          <p class="total-valor" id="total-value">R$ —</p>
        </div>
        <button id="logout-btn" class="btn-sair">Sair da conta</button>
      </div>
    </div>
  </div>

  <!-- O script.js permanece inalterado e mantém toda a lógica original -->
  <script src="script.js"></script>
</body>
</html>
